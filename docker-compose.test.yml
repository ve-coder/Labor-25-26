services:
  rubiks-test:
    build:
      # NEU: Er zieht sich den Code und den Bauplan direkt von GitHub!
      context: https://github.com/ve-coder/Labor-25-26.git#main
      dockerfile: Dockerfile.test
    container_name: rubiks-test
    
    privileged: true
    
    devices:
      - /dev/video0:/dev/video0
      - /dev/video10:/dev/video10
      - /dev/video11:/dev/video11
      - /dev/video12:/dev/video12
      - /dev/media0:/dev/media0
      - /dev/dma_heap:/dev/dma_heap
      - /dev/vchiq:/dev/vchiq
      - /dev/dri:/dev/dri
    
    group_add:
      - "44"
    
    environment:
      - TEST_MODE=1
      - DISPLAY=${DISPLAY:-:0}
    
    volumes:
      - /run/udev:/run/udev:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Deine Speicherorte für die Kalibrierung bleiben erhalten!
      - ./data:/app/data
      - ./cube_calib.json:/app/cube_calib.json
      
    stdin_open: true
    tty: true
